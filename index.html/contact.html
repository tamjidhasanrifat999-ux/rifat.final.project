 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Tamjed Rifat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="contact-header">
        <h1>Contact <span>Us</span></h1>
        <p>Have a question or want to work together?</p>
    </header>

    <main class="container">
        <div class="contact-grid">
            <div class="contact-sidebar">
                <div class="info-card">
                    <i class="fas fa-envelope"></i>
                    <h3>Email Me</h3>
                    <p>tamjed@example.com</p>
                </div>
                <div class="info-card">
                    <i class="fab fa-github"></i>
                    <h3>GitHub</h3>
                    <p>github.com/tamjedrifat</p>
                </div>
                <div class="info-card">
                    <i class="fas fa-map-marker-alt"></i>
                    <h3>Location</h3>
                    <p>Cumilla, Bangladesh</p>
                </div>
            </div>

            <div class="contact-form-container">
                <form action="#" class="main-form">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label>Your Email</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="How can I help you?" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message <i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Tamjed Rifat | All Rights Reserved</p>
    </footer>

</body>
</html>
